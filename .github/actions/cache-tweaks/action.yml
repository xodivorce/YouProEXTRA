name: Cache Tweaks
description: Caches built .deb files per tweak, keyed on commit hash + SDK version

inputs:
  sdk_version:
    required: true
  youpip:
    required: false
    default: 'true'
  ytuhd:
    required: false
    default: 'true'
  ryd:
    required: false
    default: 'true'
  ytabconfig:
    required: false
    default: 'true'
  youquality:
    required: false
    default: 'true'
  isponsorblock:
    required: false
    default: 'false'
  demc:
    required: false
    default: 'false'
  ythold:
    required: false
    default: 'false'
  volumeboost:
    required: false
    default: 'false'
  nativeshare:
    required: false
    default: 'false'
  theos_commit:
    required: true
  youpip_commit:
    required: true
  ytuhd_commit:
    required: true
  ryd_commit:
    required: true
  ygs_commit:
    required: true
  ytvo_commit:
    required: true
  ytabconfig_commit:
    required: true
  youquality_commit:
    required: true
  youspeed_commit:
    required: false
    default: ''
  youmute_commit:
    required: false
    default: ''
  youloop_commit:
    required: false
    default: ''
  alderis_commit:
    required: false
    default: ''
  youslider_commit:
    required: false
    default: ''
  youchoose_commit:
    required: false
    default: ''
  ytsilentvote_commit:
    required: false
    default: ''
  youshare_commit:
    required: false
    default: ''
  gonerino_commit:
    required: false
    default: ''
  ytweaks_commit:
    required: false
    default: ''
  yougetcaption_commit:
    required: false
    default: ''
  iamyoutube_commit:
    required: false
    default: ''
  isponsorblock_commit:
    required: false
    default: 'disabled'
  demc_commit:
    required: false
    default: 'disabled'
  ytvid_commit:
    required: false
    default: 'disabled'
  ythold_commit:
    required: false
    default: 'disabled'
  volumeboost_commit:
    required: false
    default: 'disabled'  
  nativeshare_commit:
    required: false
    default: 'disabled'  

outputs:
  cache_youpip_hit:        { value: "${{ steps.cache_youpip.outputs.cache-hit }}" }
  cache_ytuhd_hit:         { value: "${{ steps.cache_ytuhd.outputs.cache-hit }}" }
  cache_ryd_hit:           { value: "${{ steps.cache_ryd.outputs.cache-hit }}" }
  cache_ygs_hit:           { value: "${{ steps.cache_ygs.outputs.cache-hit }}" }
  cache_ytvo_hit:          { value: "${{ steps.cache_ytvo.outputs.cache-hit }}" }
  cache_ytabconfig_hit:    { value: "${{ steps.cache_ytabconfig.outputs.cache-hit }}" }
  cache_youquality_hit:    { value: "${{ steps.cache_youquality.outputs.cache-hit }}" }
  cache_youspeed_hit:      { value: "${{ steps.cache_youspeed.outputs.cache-hit }}" }
  cache_youmute_hit:       { value: "${{ steps.cache_youmute.outputs.cache-hit }}" }
  cache_youloop_hit:       { value: "${{ steps.cache_youloop.outputs.cache-hit }}" }
  cache_alderis_hit:       { value: "${{ steps.cache_alderis.outputs.cache-hit }}" }
  cache_youslider_hit:     { value: "${{ steps.cache_youslider.outputs.cache-hit }}" }
  cache_youchoose_hit:     { value: "${{ steps.cache_youchoose.outputs.cache-hit }}" }
  cache_ytsilentvote_hit:  { value: "${{ steps.cache_ytsilentvote.outputs.cache-hit }}" }
  cache_youshare_hit:      { value: "${{ steps.cache_youshare.outputs.cache-hit }}" }
  cache_gonerino_hit:      { value: "${{ steps.cache_gonerino.outputs.cache-hit }}" }
  cache_ytweaks_hit:       { value: "${{ steps.cache_ytweaks.outputs.cache-hit }}" }
  cache_yougetcaption_hit: { value: "${{ steps.cache_yougetcaption.outputs.cache-hit }}" }
  cache_iamyoutube_hit:    { value: "${{ steps.cache_iamyoutube.outputs.cache-hit }}" }
  cache_isponsorblock_hit: { value: "${{ steps.cache_isponsorblock.outputs.cache-hit }}" }
  cache_demc_hit:          { value: "${{ steps.cache_demc.outputs.cache-hit }}" }
  cache_ytvid_hit:         { value: "${{ steps.cache_ytvid.outputs.cache-hit }}" }
  cache_ythold_hit:        { value: "${{ steps.cache_ythold.outputs.cache-hit }}" }
  cache_volumeboost_hit:   { value: "${{ steps.cache_volumeboost.outputs.cache-hit }}" }
  cache_nativeshare_hit:   { value: "${{ steps.cache_nativeshare.outputs.cache-hit }}" }

runs:
  using: composite
  steps:

    - uses: actions/cache@v4
      if: inputs.youpip == 'true'
      id: cache_youpip
      with:
        path: ${{ github.workspace }}/youpip.deb
        key: youpip-${{ inputs.youpip_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.ytuhd == 'true'
      id: cache_ytuhd
      with:
        path: ${{ github.workspace }}/ytuhd.deb
        key: ytuhd-v2-${{ inputs.ytuhd_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.ryd == 'true'
      id: cache_ryd
      with:
        path: ${{ github.workspace }}/ryd.deb
        key: ryd-${{ inputs.ryd_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      id: cache_ygs
      with:
        path: ${{ github.workspace }}/ygs.deb
        key: ygs-${{ inputs.ygs_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.ytabconfig == 'true'
      id: cache_ytabconfig
      with:
        path: ${{ github.workspace }}/ytabconfig.deb
        key: ytabconfig-${{ inputs.ytabconfig_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.youquality == 'true'
      id: cache_youquality
      with:
        path: ${{ github.workspace }}/youquality.deb
        key: youquality-${{ inputs.youquality_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      id: cache_ytvo
      with:
        path: ${{ github.workspace }}/ytvo.deb
        key: ytvo-${{ inputs.ytvo_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.youspeed_commit != ''
      id: cache_youspeed
      with:
        path: ${{ github.workspace }}/youspeed.deb
        key: youspeed-v1-${{ inputs.youspeed_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.youmute_commit != ''
      id: cache_youmute
      with:
        path: ${{ github.workspace }}/ym.deb
        key: youmute-v1-${{ inputs.youmute_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.youloop_commit != ''
      id: cache_youloop
      with:
        path: ${{ github.workspace }}/youloop.deb
        key: youloop-${{ inputs.youloop_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.alderis_commit != ''
      id: cache_alderis
      with:
        path: ${{ github.workspace }}/alderis.deb
        key: alderis-${{ inputs.alderis_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.youslider_commit != ''
      id: cache_youslider
      with:
        path: ${{ github.workspace }}/youslider.deb
        key: youslider-${{ inputs.youslider_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      id: cache_youchoose
      with:
        path: ${{ github.workspace }}/youchoose.deb
        key: youchoose-${{ inputs.youchoose_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.ytsilentvote_commit != ''
      id: cache_ytsilentvote
      with:
        path: ${{ github.workspace }}/ytnovote.deb
        key: ytsilentvote-${{ inputs.ytsilentvote_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      id: cache_youshare
      with:
        path: ${{ github.workspace }}/youshare.deb
        key: youshare-${{ inputs.youshare_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.gonerino_commit != ''
      id: cache_gonerino
      with:
        path: ${{ github.workspace }}/gonerino.deb
        key: gonerino-${{ inputs.gonerino_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.ytweaks_commit != ''
      id: cache_ytweaks
      with:
        path: ${{ github.workspace }}/ytweaks.deb
        key: ytweaks-${{ inputs.ytweaks_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.yougetcaption_commit != ''
      id: cache_yougetcaption
      with:
        path: ${{ github.workspace }}/ygc.deb
        key: yougetcaption-${{ inputs.yougetcaption_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.iamyoutube_commit != ''
      id: cache_iamyoutube
      with:
        path: ${{ github.workspace }}/imyt.deb
        key: iamyoutube-${{ inputs.iamyoutube_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.isponsorblock == 'true'
      id: cache_isponsorblock
      with:
        path: ${{ github.workspace }}/isponsorblock.deb
        key: isponsorblock-${{ inputs.isponsorblock_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.demc == 'true'
      id: cache_demc
      with:
        path: ${{ github.workspace }}/demc.deb
        key: demc-${{ inputs.demc_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      id: cache_ytvid
      with:
        path: ${{ github.workspace }}/ytvideoerror.deb
        key: ytvid-${{ inputs.ytvid_commit }}-sdk${{ inputs.sdk_version }}
        
    - uses: actions/cache@v4
      if: inputs.ythold == 'true'
      id: cache_ythold
      with:
        path: ${{ github.workspace }}/ythold.deb
        key: ythold-${{ inputs.ythold_commit }}-sdk${{ inputs.sdk_version }}

    - uses: actions/cache@v4
      if: inputs.volumeboost == 'true'
      id: cache_volumeboost
      with:
        path: ${{ github.workspace }}/volumeboost.deb
        key: volumeboost-${{ inputs.volumeboost_commit }}-arm64-sdk${{ inputs.sdk_version }}
        
    - uses: actions/cache@v4
      if: inputs.nativeshare == 'true'
      id: cache_nativeshare
      with:
        path: ${{ github.workspace }}/nativeshare.deb
        key: nativeshare-${{ inputs.nativeshare_commit }}-sdk${{ inputs.sdk_version }}
